name: Publicar KPassword

on:
  workflow_dispatch:

jobs:
  publicar-windows:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v5

      - name: Preparar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Preparar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache do Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Instalar dependencias
        run: npm ci

      - name: Gerar instalador e publicar release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: KPassword v__VERSION__
          releaseBody: Verificacao automatica de atualizacoes, aviso discreto e melhorias de confiabilidade.
          releaseDraft: false
          prerelease: false
          args: --bundles nsis
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
